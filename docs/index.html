<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIM Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #dddddd;
      font-family: "Consolas", "Courier New", monospace;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 0.12em;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #666666;
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.5rem 1.4rem;
      border: 1px solid #333333;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #888888;
      letter-spacing: 0.08em;
    }

    footer {
      position: fixed;
      bottom: 1.2rem;
      font-size: 0.75rem;
      color: #333333;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <h1>MIM Control</h1>
  <p class="subtitle">Mouse Input Modifier</p>
  <span class="badge">Coming soon — MIM Mouse Input Modifier</span>
  <footer>mim-control.io</footer>
</body>
</html>
